model:
  max_epochs: 1
  dropout: 0.2
  hidden_dim_tabular_head: 256
  normalize_features: true

data:
  fold_dir: "../../../datasets/fold"
  target_col: "gs_rankin_6isdeath"
  include_tabular: false
  normalize_tabular: true
  drop_missing_label: true
  size: [96, 96, 96]
  batch_size: 8
  val_batch_size: 1
  test_batch_size: 1
  num_workers: 4
  pin_memory: false

simclrvit:
  ckpt_path: "./checkpoints/BrainIAC_mock.ckpt"

optim:
  optimizer: "adamw"
  lr: 0.0008
  momentum: 0.9
  weight_decay: 0.0001

logger:
  output_dir: "./outputs/soop_gsrankin_image_only"
  save_dir: "./outputs/soop_gsrankin_image_only/checkpoints"
  save_name: "best-model-{epoch:02d}-{val_mae:.4f}"
  run_name: "brainiac-soop-gsrankin-image-only"
  project_name: "brainiac-soop-outcome"

train:
  freeze_backbone: "no"
  accelerator: "gpu"
  devices: 1
  precision: "16-mixed"
  grad_clip_norm: 1.0
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  seed: 42
  use_wandb: true

gpu:
  visible_device: "2"
